!====================================================================
! CISCO MIGRATION CONFIG EXTRACT
! Source Vendor: arista
!====================================================================

! SECTION: VRF DEFINITIONS
!--------------------------------------------------------------------
vrf definition RED
 rd 1:1
 address-family ipv4
  route-target import 1:1
  route-target export 1:1
 exit-address-family
!

! SECTION: INTERFACES
!--------------------------------------------------------------------
interface Ethernet1
 vrf forwarding RED
 ip address 10.0.0.1 24
 ip access-group SERVER-IN in
 no shutdown
!

! SECTION: ACCESS LISTS
!--------------------------------------------------------------------
ip access-list extended SERVER-IN
 permit tcp any host 10.0.0.1 eq 80 log
 permit ip any any
!

! SECTION: BGP VRF STANZAS
!--------------------------------------------------------------------
router bgp
 address-family ipv4 vrf RED
  neighbor 10.0.0.2 remote-as 65001
 exit-address-family
!

