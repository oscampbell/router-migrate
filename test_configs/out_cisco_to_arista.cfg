!====================================================================
! ARISTA MIGRATION CONFIG EXTRACT
! Source Vendor: cisco
!====================================================================

! SECTION: VRF INSTANCE DEFINITIONS
!--------------------------------------------------------------------
vrf instance RED
   rd 1:1
   route-target import 1:1
   route-target export 1:1
!

! SECTION: IP ROUTING VRF STATEMENTS
!--------------------------------------------------------------------
ip routing vrf RED
!

! SECTION: INTERFACES
!--------------------------------------------------------------------
interface GigabitEthernet0/0
   no shutdown
   vrf RED
   ip address 10.0.0.1/255.255.255.0
   ip access-group SERVER-IN in
!

! SECTION: ACCESS LISTS
!--------------------------------------------------------------------
ip access-list SERVER-IN
   permit tcp any host 10.0.0.1 eq 80 log
   permit ip any any
!

! SECTION: BGP VRF STANZAS (paste inside 'router bgp <ASN>')
!--------------------------------------------------------------------
   vrf RED
      neighbor 10.0.0.2 remote-as 65001
   !

